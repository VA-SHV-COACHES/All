<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virgin Active Holland Village — Meet Your Coaches</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#111;color:#fff;}
.hero{background:#111;border-bottom:2px solid #c8102e;padding:36px 24px 28px;text-align:center;}
.hero-sub{font-size:12px;letter-spacing:3px;color:#c8102e;font-weight:500;text-transform:uppercase;margin-bottom:8px;}
.hero-title{font-size:28px;font-weight:500;color:#fff;line-height:1.2;}
.hero-title span{color:#c8102e;}
.section{max-width:960px;margin:0 auto;padding:40px 20px 0;}
.section-label{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.section-label-text{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;color:#c8102e;white-space:nowrap;}
.section-label-line{flex:1;height:1px;background:#333;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.card{background:#1a1a1a;border:0.5px solid #333;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.2s;}
.card:hover{border-color:#c8102e;}
.card-top{background:#c8102e;padding:20px 16px 16px;text-align:center;}
.avatar{width:88px;height:88px;border-radius:50%;border:3px solid #fff;margin:0 auto 10px;overflow:hidden;background:#111;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:#fff;}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;}
.card-name{font-size:16px;font-weight:600;color:#fff;}
.card-specialty{font-size:11px;color:rgba(255,255,255,0.85);margin-top:4px;line-height:1.4;}
.chevron{display:inline-block;width:16px;height:16px;margin-top:8px;transition:transform 0.3s;}
.chevron svg{width:16px;height:16px;fill:none;stroke:rgba(255,255,255,0.7);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.card.open .chevron{transform:rotate(180deg);}
.card-details{max-height:0;overflow:hidden;transition:max-height 0.4s ease;}
.card-details.open{max-height:600px;}
.card-body{padding:14px 16px 16px;}
.section-block{margin-bottom:12px;}
.block-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#c8102e;font-weight:500;margin-bottom:6px;}
.block-text{font-size:12px;color:#ccc;line-height:1.6;}
.qual-list{list-style:none;padding:0;margin:0;}
.qual-list li{font-size:12px;color:#ccc;line-height:1.5;padding:2px 0 2px 12px;position:relative;}
.qual-list li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;background:#c8102e;border-radius:50%;}
.fav-ex{display:inline-block;background:#c8102e;color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;margin-top:4px;}
.divider{height:0.5px;background:#2a2a2a;margin:10px 0;}
.contact-section{max-width:560px;margin:48px auto 0;padding:0 20px 60px;}
.contact-card{background:#1a1a1a;border:0.5px solid #333;border-radius:12px;padding:28px 24px;}
.contact-title{font-size:18px;font-weight:500;color:#fff;margin-bottom:6px;}
.contact-sub{font-size:13px;color:#888;margin-bottom:24px;}
.form-row{margin-bottom:14px;}
.form-label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:6px;}
.opt-tag{font-size:10px;color:#555;letter-spacing:0;text-transform:none;margin-left:4px;}
.form-input{width:100%;background:#111;border:0.5px solid #444;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:#c8102e;}
.form-textarea{width:100%;background:#111;border:0.5px solid #444;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:100px;transition:border-color 0.2s;}
.form-textarea:focus{border-color:#c8102e;}
.form-select{width:100%;background:#111;border:0.5px solid #444;border-radius:8px;padding:10px 12px;color:#fff;font-size:14px;font-family:inherit;outline:none;}
.submit-btn{width:100%;background:#c8102e;border:none;border-radius:8px;padding:12px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;font-family:inherit;letter-spacing:1px;transition:background 0.2s;}
.submit-btn:hover{background:#a50d26;}
.submit-btn:disabled{background:#555;cursor:not-allowed;}
.success-banner{display:none;background:#1a2a1a;border:0.5px solid #3b6d11;border-radius:8px;padding:18px 16px;color:#97c459;font-size:14px;text-align:center;margin-top:14px;}
.success-banner strong{display:block;font-size:16px;margin-bottom:4px;}
.error-msg{display:none;background:#2a1a1a;border:0.5px solid #6d1111;border-radius:8px;padding:14px 16px;color:#c45959;font-size:13px;text-align:center;margin-top:14px;}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-sub">Holland Village</div>
  <div class="hero-title">Virgin <span>Active</span> &mdash; Meet Your Coaches</div>
</div>

<div class="section">
  <div class="section-label"><div class="section-label-text">Senior Coaches</div><div class="section-label-line"></div></div>
  <div class="grid" id="senior-grid"></div>
</div>
<div class="section" style="margin-top:36px;">
  <div class="section-label"><div class="section-label-text">Coaches</div><div class="section-label-line"></div></div>
  <div class="grid" id="coach-grid"></div>
</div>

<div class="contact-section">
  <div class="section-label" style="margin-bottom:20px;"><div class="section-label-text">Get in Touch</div><div class="section-label-line"></div></div>
  <div class="contact-card">
    <div class="contact-title">Ready to start your journey?</div>
    <div class="contact-sub">Fill in the form and one of our coaches will get back to you.</div>
    <div class="form-row"><label class="form-label">Your name</label><input class="form-input" type="text" id="f-name" name="name" required /></div>
    <div class="form-row"><label class="form-label">Your phone number</label><input class="form-input" type="tel" id="f-phone" name="phone" required /></div>
    <div class="form-row"><label class="form-label">Your email address <span class="opt-tag">(optional)</span></label><input class="form-input" type="email" id="f-email" name="email" /></div>
    <div class="form-row"><label class="form-label">Membership ID <span class="opt-tag">(if any)</span></label><input class="form-input" type="text" id="f-memberid" name="membership_id" /></div>
    <div class="form-row">
      <label class="form-label">Preferred trainer</label>
      <select class="form-select" id="f-trainer" name="preferred_trainer">
        <option value="No preference">No preference</option>
        <option>Zul</option><option>Sophia</option><option>Nadiah</option><option>Darren</option>
        <option>Kevin</option><option>Wen Bin</option><option>Benjamin</option><option>Travis</option>
        <option>Jaleen</option><option>Arianna</option><option>Hanney</option><option>Raiyan</option>
      </select>
    </div>
    <div class="form-row"><label class="form-label">What are your fitness goals?</label><textarea class="form-textarea" id="f-msg" name="fitness_goals" required></textarea></div>
    <button class="submit-btn" id="submit-btn" onclick="handleSubmit(event)">Send Message</button>
    <div class="success-banner" id="success-banner">
      <strong>Message sent!</strong>
      We'll be in touch with you soon.
    </div>
    <div class="error-msg" id="error-msg">Something went wrong. Please try again or contact us directly.</div>
  </div>
</div>

function buildCard(t, idx) {
  const quals = t.qualifications.map(q => `<li>${q}</li>`).join('');
  const av = t.img ? `<img src="${t.img}" alt="${t.name}" />` : t.name.substring(0,2).toUpperCase();
  return `<div class="card" id="card-${idx}" onclick="toggleCard(${idx})">
    <div class="card-top">
      <div class="avatar">${av}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-specialty">${t.specialty}</div>
      <div class="chevron">${chevronSVG}</div>
    </div>
    <div class="card-details" id="details-${idx}">
      <div class="card-body">
        <div class="section-block"><div class="block-label">Qualifications</div><ul class="qual-list">${quals}</ul></div>
        <div class="divider"></div>
        <div class="section-block"><div class="block-label">What I'm into</div><div class="block-text">${t.into}</div></div>
        <div class="divider"></div>
        <div class="section-block"><div class="block-label">Favourite exercise</div><span class="fav-ex">${t.fav}</span></div>
      </div>
    </div>
  </div>`;
}

document.getElementById('senior-grid').innerHTML = trainers.filter(t=>t.tier==='senior').map((t,i)=>buildCard(t,i)).join('');
document.getElementById('coach-grid').innerHTML = trainers.filter(t=>t.tier==='coach').map((t,i)=>buildCard(t,i+4)).join('');

function toggleCard(idx) {
  const card = document.getElementById('card-'+idx);
  const details = document.getElementById('details-'+idx);
  card.classList.toggle('open');
  details.classList.toggle('open');
}

async function handleSubmit(e) {
  e.preventDefault();
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const msg = document.getElementById('f-msg').value.trim();
  if (!name || !phone || !msg) { alert('Please fill in your name, phone number and fitness goals.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  document.getElementById('success-banner').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';

  const data = {
    name: name,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value || 'Not provided',
    membership_id: document.getElementById('f-memberid').value || 'N/A',
    preferred_trainer: document.getElementById('f-trainer').value,
    fitness_goals: msg
  };

  try {
    const res = await fetch('https://formspree.io/f/mbdbgeyp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      document.getElementById('success-banner').style.display = 'block';
      document.getElementById('f-name').value = '';
      document.getElementById('f-phone').value = '';
      document.getElementById('f-email').value = '';
      document.getElementById('f-memberid').value = '';
      document.getElementById('f-trainer').value = 'No preference';
      document.getElementById('f-msg').value = '';
      btn.textContent = 'Send Message';
      btn.disabled = false;
    } else {
      throw new Error('Form submission failed');
    }
  } catch(err) {
    document.getElementById('error-msg').style.display = 'block';
    btn.textContent = 'Send Message';
    btn.disabled = false;
  }
}
</script>
